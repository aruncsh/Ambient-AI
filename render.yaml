services:
  # Backend Service (FastAPI)
  - type: web
    name: ambient-ai-backend
    env: python
    plan: free
    rootDir: ./backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false # User should provide this (e.g. MongoDB Atlas)
      - key: SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        value: c2VjcmV0LWtleS1tdXN0LWJlLTMyLWJ5dGVzLWxvbmctISEh # Update this in Prod!
      - key: WHISPER_PROVIDER
        value: openai # REQUIRED for Free Tier (Local Whisper exceeds 512MB RAM)
      - key: OPENAI_API_KEY
        sync: false
      - key: MEDICAL_NLP_PROVIDER
        value: llm


  # Frontend Service (Static Site)
  - type: web
    name: ambient-ai-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./frontend/dist
    rootDir: ./frontend
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: ambient-ai-backend
          property: host
